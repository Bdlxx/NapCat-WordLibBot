<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽笙 - 管理面板</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪶</text></svg>">
<style>
:root {
  --bg-page: #f0f2f5; --bg-sidebar: #fff; --bg-header: #fff; --bg-card: #fff;
  --bg-input: #f5f7fa; --bg-hover: #f0f2ff; --bg-active: #ecf5ff;
  --text-primary: #303133; --text-regular: #606266; --text-secondary: #909399;
  --border-color: #e4e7ed; --border-light: #ebeef5;
  --color-primary: #409eff; --color-primary-light: #66b1ff;
  --color-success: #67c23a; --color-warning: #e6a23c; --color-danger: #f56c6c;
  --shadow-card: 0 2px 12px 0 rgba(0,0,0,.06);
  --radius: 8px; --radius-lg: 12px; --sidebar-width: 220px;
}
[data-theme="dark"] {
  --bg-page: #141414; --bg-sidebar: #1d1d1d; --bg-header: #1d1d1d; --bg-card: #1d1d1d;
  --bg-input: #2a2a2a; --bg-hover: #2a2a3a; --bg-active: #1a2a3a;
  --text-primary: #e5eaf3; --text-regular: #cfd3dc; --text-secondary: #a3a6ad;
  --border-color: #333; --border-light: #2a2a2a;
  --shadow-card: 0 2px 12px 0 rgba(0,0,0,.3);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;font-size:14px;color:var(--text-primary);background:var(--bg-page);-webkit-font-smoothing:antialiased}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-width);background:var(--bg-sidebar);border-right:1px solid var(--border-color);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.sidebar-logo{padding:18px 16px;font-size:16px;font-weight:700;border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:8px}
.sidebar-logo .logo-text{color:var(--color-primary)}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:2px}
.nav-group-title{padding:14px 16px 6px;font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text-regular);transition:all .2s;border-left:3px solid transparent;margin:2px 0;font-size:13px;border-radius:0 8px 8px 0;margin-right:8px}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.nav-item.active{background:var(--bg-active);color:var(--color-primary);border-left-color:var(--color-primary);font-weight:600}
.nav-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.header{background:var(--bg-header);border-bottom:1px solid var(--border-color);padding:0 24px;height:56px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-breadcrumb{font-size:14px;color:var(--text-secondary)}
.header-breadcrumb .current{color:var(--text-primary);font-weight:500}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.el-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:4px;font-size:12px;font-weight:500}
.el-tag.success{background:rgba(103,194,58,.15);color:var(--color-success)}
.el-tag.danger{background:rgba(245,108,108,.15);color:var(--color-danger)}
.el-tag.warning{background:rgba(230,162,60,.15);color:var(--color-warning)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-dot.green{background:var(--color-success)}
.status-dot.red{background:var(--color-danger)}
.status-dot.yellow{background:var(--color-warning);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border-color);background:var(--bg-input);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-regular);transition:all .2s}
.theme-btn:hover{border-color:var(--color-primary);color:var(--color-primary)}
.header-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border-color);background:var(--bg-input);cursor:pointer;font-size:12px;color:var(--text-regular);transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.header-btn:hover{border-color:var(--color-primary);color:var(--color-primary)}
.content{flex:1;overflow-y:auto;padding:20px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px}
.card{background:var(--bg-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);border:1px solid var(--border-light);margin-bottom:16px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.card-header h3{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:16px 20px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-card);border:1px solid var(--border-light);display:flex;align-items:flex-start;gap:16px}
.stat-card:hover{box-shadow:0 4px 16px 0 rgba(0,0,0,.1)}
.stat-icon{width:44px;height:44px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-icon.blue{background:rgba(64,158,255,.12)}
.stat-icon.green{background:rgba(103,194,58,.12)}
.stat-icon.orange{background:rgba(230,162,60,.12)}
.stat-icon.purple{background:rgba(144,107,224,.12)}
.stat-info{flex:1;min-width:0}
.stat-info .label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.stat-info .value{font-size:22px;font-weight:700;color:var(--text-primary)}
.stat-info .desc{font-size:12px;color:var(--text-secondary);margin-top:4px}
.el-table{width:100%;border-collapse:collapse;font-size:13px}
.el-table th{padding:12px 16px;text-align:left;font-weight:600;background:var(--bg-input);color:var(--text-regular);border-bottom:1px solid var(--border-color)}
.el-table td{padding:12px 16px;border-bottom:1px solid var(--border-light)}
.el-table tr:hover td{background:var(--bg-hover)}
.btn{padding:9px 20px;border-radius:var(--radius);border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-primary:hover{background:var(--color-primary-light)}
.btn-success{background:var(--color-success);color:#fff}
.btn-default{background:var(--bg-input);color:var(--text-regular);border:1px solid var(--border-color)}
.btn-default:hover{color:var(--color-primary);border-color:var(--color-primary)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--radius);font-size:14px;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.15);white-space:nowrap}
.toast.show{opacity:1;pointer-events:auto}
.toast.success{background:var(--color-success);color:#fff}
.toast.error{background:var(--color-danger);color:#fff}
.toast.info{background:var(--color-primary);color:#fff}
.log-viewer{background:#1e1e1e;color:#d4d4d4;font-family:Consolas,Monaco,monospace;font-size:12px;padding:16px;border-radius:var(--radius);max-height:500px;overflow-y:auto;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.log-viewer .error{color:#f44747}
.log-viewer .info{color:#9cdcfe}
.log-viewer .warn{color:#ce9178}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.4}
@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;transition:left .3s;z-index:100}
  .sidebar.open{left:0}
  .sidebar-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:99;display:none}
  .sidebar-overlay.open{display:block}
  .content{padding:12px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .mobile-menu-btn{display:flex!important}
}
.mobile-menu-btn{display:none}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo" style="flex-direction:column;align-items:flex-start;gap:2px;">
      <div style="display:flex;align-items:center;gap:8px;width:100%;">
        <img id="botAvatar" src="" style="width:36px;height:36px;border-radius:50%;background:var(--bg-input);flex-shrink:0" alt="">
        <div style="min-width:0;flex:1;">
          <div class="logo-text" id="botName" style="font-size:14px;">加载中...</div>
          <div style="font-size:11px;color:var(--text-secondary);" id="botQQ"></div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>
  <div class="main">
    <header class="header">
      <button class="header-btn mobile-menu-btn" onclick="toggleSidebar()" style="border:none;background:transparent;font-size:18px;">☰</button>
      <div class="header-breadcrumb" id="breadcrumb"><span class="current">仪表盘</span></div>
      <div class="header-right">
        <span class="el-tag" id="statusTag"><span class="status-dot yellow"></span> 检测中</span>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
        <a class="header-btn" onclick="handleLogout()" style="cursor:pointer;">🚪 退出</a>
      </div>
    </header>
    <div class="content" id="pageContent"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const botNum = window.location.pathname.startsWith('/yixing') ? 1 : 2;
const BOT_NAME = botNum === 1 ? '依星' : '羽笙';
// 所有API请求自动带CSRF防护头
const _origFetch = window.fetch;
window.fetch = function(url, opts) {
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['X-Requested-With'] = 'XMLHttpRequest';
  return _origFetch.call(this, url, opts);
};
fetch('/api/check-auth').then(r=>r.json()).then(d=>{if(!d.authenticated)window.location.href='/'}).catch(()=>window.location.href='/');
// 加载头像、昵称、QQ号
fetch('/api/bot/' + botNum + '/info').then(r=>r.json()).then(d=>{
  if (d.success) {
    document.getElementById('botAvatar').src = 'https://q1.qlogo.cn/g?b=qq&nk=' + d.qq + '&s=640';
    document.getElementById('botName').textContent = d.name || BOT_NAME;
    document.getElementById('botQQ').textContent = 'QQ ' + d.qq;
  }
}).catch(()=>{
  document.getElementById('botName').textContent = BOT_NAME;
});

const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') { document.documentElement.setAttribute('data-theme','dark'); document.getElementById('themeBtn').textContent = '☀️'; }

let currentPage = 'dashboard';

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function showToast(msg, type) {
  type = type || 'info';
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function handleLogout() { fetch('/api/logout',{method:'POST'}).then(()=>window.location.href='/'); }

const NAV_ITEMS = [
  { id:'dashboard', icon:'📊', label:'仪表盘', group:'概览' },
  { id:'manage',    icon:'🛠️',  label:'运行管理', group:'管理' },
  { id:'config',    icon:'⚙️',  label:'插件配置', group:'管理' },
  { id:'groups',    icon:'👥',  label:'群组开关', group:'管理' },
  { id:'logs',      icon:'📋',  label:'运行日志', group:'管理' },
];

function navigate(page) {
  currentPage = page;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  renderPage();
}

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const groups = {};
  NAV_ITEMS.forEach(item => {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push(item);
  });
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += '<div class="nav-group-title">' + g + '</div>';
    for (const item of items) {
      html += '<div class="nav-item ' + (currentPage===item.id?'active':'') + '" data-page="' + item.id + '" onclick="navigate(\'' + item.id + '\')"><span class="icon">' + item.icon + '</span> ' + item.label + '</div>';
    }
  }
  nav.innerHTML = html;
}

async function fetchStatus() {
  try {
    const r = await fetch('/api/bot/' + botNum + '/status');
    const d = await r.json();
    const tag = document.getElementById('statusTag');
    if (d.running) { tag.innerHTML = '<span class="status-dot green"></span> 运行中'; tag.className = 'el-tag success'; }
    else { tag.innerHTML = '<span class="status-dot red"></span> 已停止'; tag.className = 'el-tag danger'; }
  } catch { tag.innerHTML = '<span class="status-dot yellow"></span> 连接失败'; tag.className = 'el-tag warning'; }
}

// === Dashboard ===
async function renderDashboard() {
  document.getElementById('breadcrumb').innerHTML = '<span class="current">仪表盘</span>';
  renderSidebar();
  document.getElementById('pageContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary)">⏳ 加载中...</div>';
  try {
    const [infoR, napcatR] = await Promise.all([
      fetch('/api/bot/' + botNum + '/info').catch(()=>null),
      fetch('/api/bot/' + botNum + '/napcat-status').catch(()=>null),
    ]);
    const info = infoR ? await infoR.json() : {};
    const napcat = napcatR ? await napcatR.json() : {};
    document.getElementById('pageContent').innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-icon blue">🤖</div><div class="stat-info"><div class="label">Bot 状态</div><div class="value">${info.running?'运行中':'已停止'}</div><div class="desc">${info.name||BOT_NAME}</div></div></div>
        <div class="stat-card"><div class="stat-icon green">🐱</div><div class="stat-info"><div class="label">NapCat 状态</div><div class="value">${napcat.running?'运行中':'已停止'}</div><div class="desc">容器 ${napcat.container||'-'}</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">📦</div><div class="stat-info"><div class="label">工作目录</div><div class="value" style="font-size:16px">${info.dir||'-'}</div><div class="desc">Screen: ${info.screen||'-'}</div></div></div>
        <div class="stat-card"><div class="stat-icon purple">⚡</div><div class="stat-info"><div class="label">快捷操作</div><div class="value" style="font-size:14px;font-weight:500"><a href="#" onclick="navigate(\'manage\');return false" style="color:var(--color-primary)">🛠️ 管理</a> · <a href="#" onclick="navigate(\'config\');return false" style="color:var(--color-primary)">⚙️ 配置</a></div><div class="desc">点击进入</div></div></div>
      </div>
      <div class="card"><div class="card-header"><h3>🔍 系统信息</h3></div><div class="card-body"><table class="el-table"><tr><th width="120">项目</th><th>值</th></tr>
        <tr><td>机器人</td><td>${info.name||BOT_NAME} (QQ:${info.qq||'-'})</td></tr>
        <tr><td>主人 QQ</td><td>${info.master||'-'}</td></tr>
        <tr><td>运行目录</td><td>${info.dir||'-'}</td></tr>
        <tr><td>Screen</td><td>${info.screen||'-'}</td></tr>
        <tr><td>NapCat 容器</td><td>${napcat.container||'-'} · ${napcat.status||'-'}</td></tr>
      </table></div></div>`;
  } catch(e) {
    document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
  }
}

// === Manage ===
async function renderManage() {
  document.getElementById('breadcrumb').innerHTML = '<span class="current">运行管理</span>';
  renderSidebar();
  document.getElementById('pageContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary)">⏳ 加载中...</div>';
  try {
    const [infoR, napcatR] = await Promise.all([
      fetch('/api/bot/' + botNum + '/info').catch(()=>null),
      fetch('/api/bot/' + botNum + '/napcat-status').catch(()=>null),
    ]);
    const info = infoR ? await infoR.json() : {};
    const napcat = napcatR ? await napcatR.json() : {};
    document.getElementById('pageContent').innerHTML = `
      <div class="card"><div class="card-header"><h3>🤖 Bot 管理</h3></div><div class="card-body">
        <div style="margin-bottom:12px"><span class="el-tag ${info.running?'success':'danger'}"><span class="status-dot ${info.running?'green':'red'}"></span> ${info.running?'运行中':'已停止'}</span> ${info.name||BOT_NAME}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="doBotAction('start')">▶ 启动</button>
          <button class="btn btn-default" onclick="doBotAction('stop')">⏹ 停止</button>
          <button class="btn btn-default" onclick="doBotAction('restart')">🔄 重启</button>
        </div>
      </div></div>
      <div class="card"><div class="card-header"><h3>📱 NapCat 登录</h3></div><div class="card-body">
        <div style="margin-bottom:12px"><span class="el-tag ${napcat.running?'success':'danger'}"><span class="status-dot ${napcat.running?'green':'red'}"></span> ${napcat.running?'运行中':'已停止'}</span> ${napcat.container||'-'}</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="showQR()">📱 查看二维码</button>
        </div>
      </div></div>
      <div id="qrArea" style="display:none;text-align:center">
        <div class="card"><div class="card-header"><h3>📱 二维码</h3></div><div class="card-body" id="qrContainer">加载中...</div></div>
      </div>
      <div id="manageMsg" style="text-align:center;font-size:13px;color:var(--text-secondary);min-height:24px"></div>`;
  } catch(e) {
    document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
  }
}

async function doBotAction(action) {
  const msg = document.getElementById('manageMsg');
  msg.textContent = '操作中...';
  try {
    const r = await fetch('/api/bot/' + botNum + '/' + action, {method:'POST'});
    const d = await r.json();
    msg.textContent = d.message || d.msg || action + '成功';
    setTimeout(fetchStatus, 2000);
  } catch(e) { msg.textContent = '操作失败'; }
}

async function showQR() {
  document.getElementById('qrArea').style.display = 'block';
  document.getElementById('qrContainer').innerHTML = '获取中...';
  try {
    const r = await fetch('/api/bot/' + botNum + '/napcat-qr');
    const d = await r.json();
    if (d.qr) document.getElementById('qrContainer').innerHTML = '<img src="data:image/png;base64,' + d.qr + '" style="max-width:240px;border-radius:8px" alt="QR">';
    else document.getElementById('qrContainer').innerHTML = '<div style="color:var(--text-secondary)">暂无二维码<br>NapCat 可能未启动</div>';
  } catch(e) { document.getElementById('qrContainer').innerHTML = '<div style="color:var(--color-danger)">获取失败</div>'; }
}

// === Config ===
let configPlugins = {}, configKeys = [], activePlugin = null, dirtyPlugins = {};
function isDirty(k) { return !!dirtyPlugins[k]; }
function markClean(k) { dirtyPlugins[k] = false; }
async function renderConfig() {
  document.getElementById('breadcrumb').innerHTML = '<span class="current">插件配置</span>';
  renderSidebar();
  document.getElementById('pageContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary)">⏳ 加载中...</div>';
  try {
    const r = await fetch('/api/bot/' + botNum + '/plugins');
    const d = await r.json();
    configPlugins = d.plugins; configKeys = Object.keys(d.plugins); dirtyPlugins = {};
    if (configKeys.length === 0) { document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无可用配置</p></div>'; return; }
    let html = '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">';
    for (const key of configKeys) html += '<button class="btn ' + (key===configKeys[0]?'btn-primary':'btn-default') + '" onclick="switchConfigTab(\'' + key + '\')" id="tab_' + key + '">' + (configPlugins[key].name||key) + '</button>';
    html += '</div><div style="display:flex;gap:10px;margin-bottom:16px"><button class="btn btn-primary" onclick="saveCurrentConfig()">💾 保存</button><button class="btn btn-success" onclick="saveAndRestartConfig()">💾 保存并重启</button></div><div id="configContent"></div>';
    document.getElementById('pageContent').innerHTML = html;
    activePlugin = null;
    switchConfigTab(configKeys[0]);
  } catch(e) { document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>'; }
}
function switchConfigTab(key) {
  activePlugin = key;
  document.querySelectorAll('[id^="tab_"]').forEach(el => el.className = 'btn ' + (el.id === 'tab_'+key ? 'btn-primary' : 'btn-default'));
  const plugin = configPlugins[key]; if (!plugin) return;
  let html = '<div class="card"><div class="card-header"><h3>' + plugin.name + '</h3><span class="badge" style="font-size:11px;padding:2px 10px;border-radius:10px;background:var(--bg-active);color:var(--color-primary)">' + plugin.fields.length + ' 项</span></div>';
  for (const field of plugin.fields) {
    const fid = 'f_' + key + '_' + field.k;
    let inp = '';
    if (field.t === 'num') inp = '<input type="number" id="' + fid + '" value="' + field.v + '" min="' + (field.min||0) + '" max="' + (field.max||'') + '" step="' + (field.s||1) + '" style="width:120px;padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius);background:var(--bg-input);color:var(--text-primary);font-size:13px;outline:none">';
    else if (field.t === 'sel' && field.o && field.o.length === 2 && field.o.includes('true')) {
      const ch = String(field.v) === 'true';
      inp = '<label class="el-switch" style="display:inline-flex;align-items:center;cursor:pointer;gap:8px"><input type="checkbox" id="' + fid + '" ' + (ch?'checked':'') + ' onchange="onCfgChange()"><span class="track" style="width:40px;height:20px;border-radius:10px;background:' + (ch?'var(--color-primary)':'var(--border-color)') + ';transition:all .2s;position:relative;display:inline-block"></span><span style="font-size:12px;color:var(--text-secondary)">' + (ch?'已开启':'已关闭') + '</span></label>';
    } else if (field.t === 'sel') {
      const opts = field.o.map(o => '<option value="' + o + '" ' + (String(o)===String(field.v)?'selected':'') + '>' + o + '</option>').join('');
      inp = '<select id="' + fid + '" style="padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius);background:var(--bg-input);color:var(--text-primary);font-size:13px;outline:none;max-width:240px">' + opts + '</select>';
    } else if (field.t === 'textlist') inp = '<textarea id="' + fid + '" placeholder="每行一个" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius);background:var(--bg-input);color:var(--text-primary);font-size:13px;outline:none;resize:vertical;min-height:80px">' + (Array.isArray(field.v)?field.v.join('\n'):'') + '</textarea>';
    else if (field.t === 'password') inp = '<input type="password" id="' + fid + '" value="' + field.v + '" autocomplete="off" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius);background:var(--bg-input);color:var(--text-primary);font-size:13px;outline:none">';
    else if (field.t === 'textarea') inp = '<textarea id="' + fid + '" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius);background:var(--bg-input);color:var(--text-primary);font-size:13px;outline:none;resize:vertical;min-height:120px">' + field.v + '</textarea>';
    else inp = '<input type="text" id="' + fid + '" value="' + (field.v||'') + '" style="width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius);background:var(--bg-input);color:var(--text-primary);font-size:13px;outline:none">';
    html += '<div class="card-body" style="border-bottom:1px solid var(--border-light);padding:14px 20px"><label style="display:block;font-size:13px;font-weight:500;margin-bottom:8px">' + field.l + '</label>' + inp + (field.hint?'<div style="font-size:12px;color:var(--text-secondary);margin-top:6px">' + field.hint + '</div>':'') + '</div>';
  }
  html += '</div>';
  document.getElementById('configContent').innerHTML = html;
  for (const field of plugin.fields) {
    const el = document.getElementById('f_' + key + '_' + field.k);
    if (el) el.oninput = el.onchange = function() { if (!isDirty(key)) { dirtyPlugins[key]=true; } };
  }
}
function onCfgChange() { if (activePlugin && !isDirty(activePlugin)) dirtyPlugins[activePlugin] = true; }
function collectCfg(key) {
  const cfg = {}, plugin = configPlugins[key]; if (!plugin) return null;
  for (const field of plugin.fields) {
    const el = document.getElementById('f_' + key + '_' + field.k); if (!el) continue;
    if (field.t === 'num') cfg[field.k] = parseFloat(el.value);
    else if (field.t === 'textlist') cfg[field.k] = el.value.split('\n').map(s=>s.trim()).filter(s=>s);
    else if (el.type === 'checkbox') cfg[field.k] = el.checked ? 'true' : 'false';
    else cfg[field.k] = el.value;
  }
  return cfg;
}
async function saveCurrentConfig() {
  if (!activePlugin) return; const cfg = collectCfg(activePlugin); if (!cfg) return;
  showToast('💾 保存中...','info');
  try {
    const r = await fetch('/api/bot/' + botNum + '/config', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plugin:activePlugin,cfg})});
    const d = await r.json();
    if (!d.ok) throw new Error(d.error||'保存失败');
    dirtyPlugins[activePlugin] = false; showToast('✅ 已保存','success'); fetchStatus();
  } catch(e) { showToast('❌ '+e.message,'error'); }
}
async function saveAndRestartConfig() {
  if (!activePlugin) return; const cfg = collectCfg(activePlugin); if (!cfg) return;
  showToast('💾 保存中...','info');
  try {
    await fetch('/api/bot/' + botNum + '/config', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plugin:activePlugin,cfg})});
    showToast('✅ 已保存，正在重启...','success');
    setTimeout(async () => { await fetch('/api/bot/' + botNum + '/restart',{method:'POST'}); showToast('🔄 已重启','success'); fetchStatus(); }, 500);
  } catch(e) { showToast('❌ '+e.message,'error'); }
}

// === Groups ===
async function renderGroups() {
  document.getElementById('breadcrumb').innerHTML = '<span class="current">群组开关</span>';
  renderSidebar();
  document.getElementById('pageContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary)">⏳ 加载中...</div>';
  try {
    const r = await fetch('/api/bot/' + botNum + '/plugins');
    const d = await r.json();
    const toggles = d.plugins.group_toggles;
    if (!toggles || !toggles.fields || !toggles.fields.length) {
      document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">🔀</div><p>暂无群组开关数据</p><div style="margin-top:8px;font-size:12px;color:var(--text-secondary)">在群内发送「开启词库」等命令后自动生成</div></div>'; return;
    }
    let html = '<div class="card"><div class="card-header"><h3>👥 分群插件开关</h3><span class="badge" style="font-size:11px;padding:2px 10px;border-radius:10px;background:var(--bg-active);color:var(--color-primary)">' + toggles.fields.length + ' 个群</span></div><table class="el-table"><tr><th>群号</th><th>已开启插件</th></tr>';
    for (const field of toggles.fields) {
      const parts = (field._line||'').match(/群 (\d+): (.+)/);
      if (parts) html += '<tr><td>' + parts[1] + '</td><td>' + parts[2] + '</td></tr>';
    }
    html += '</table></div><div class="card"><div class="card-header"><h3>💡 说明</h3></div><div class="card-body" style="font-size:13px;color:var(--text-secondary);line-height:1.8">所有插件在每个群默认关闭。<br>在群内发送对应命令开启：<code>开启词库</code> / <code>关闭词库</code><br>私聊发送 = 全局控制。</div></div>';
    document.getElementById('pageContent').innerHTML = html;
  } catch(e) { document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>'; }
}

// === Logs ===
async function renderLogs() {
  document.getElementById('breadcrumb').innerHTML = '<span class="current">运行日志</span>';
  renderSidebar();
  document.getElementById('pageContent').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-secondary)">⏳ 加载中...</div>';
  try {
    const r = await fetch('/api/bot/' + botNum + '/screen-log');
    const d = await r.json();
    const lines = (d.log||'暂无日志').split('\n');
    let logHtml = '';
    for (const line of lines) {
      let cls = '';
      if (line.match(/error|exception|trace|失败|✗/i)) cls = 'error';
      else if (line.match(/warn/i)) cls = 'warn';
      else if (line.match(/✓|成功|启动|连接|加载/i)) cls = 'info';
      logHtml += '<div class="' + cls + '">' + escapeHtml(line) + '</div>';
    }
    document.getElementById('pageContent').innerHTML = '<div class="card"><div class="card-header"><h3>📋 运行日志</h3><span style="font-size:12px;color:var(--text-secondary)">runtime.log</span></div><div class="card-body"><div class="log-viewer">' + logHtml + '</div></div></div><button class="btn btn-default" onclick="renderLogs()">🔄 刷新</button>';
  } catch(e) { document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>'; }
}

function renderPage() {
  switch (currentPage) {
    case 'dashboard': renderDashboard(); break;
    case 'manage':    renderManage(); break;
    case 'config':    renderConfig(); break;
    case 'groups':    renderGroups(); break;
    case 'logs':      renderLogs(); break;
    default: renderDashboard();
  }
}

fetchStatus();
renderPage();
setInterval(fetchStatus, 15000);
</script>
