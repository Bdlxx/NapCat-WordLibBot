<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽笙 - 系统配置</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪶</text></svg>">
<style>
/* ========== CSS Variables (Themes) ========== */
:root {
  --bg-page: #f0f2f5;
  --bg-sidebar: #fff;
  --bg-header: #fff;
  --bg-card: #fff;
  --bg-input: #f5f7fa;
  --bg-hover: #f0f2ff;
  --bg-active: #ecf5ff;
  --text-primary: #303133;
  --text-regular: #606266;
  --text-secondary: #909399;
  --text-placeholder: #c0c4cc;
  --border-color: #e4e7ed;
  --border-light: #ebeef5;
  --color-primary: #409eff;
  --color-primary-light: #66b1ff;
  --color-primary-dark: #3a8ee6;
  --color-success: #67c23a;
  --color-warning: #e6a23c;
  --color-danger: #f56c6c;
  --shadow-card: 0 2px 12px 0 rgba(0,0,0,.06);
  --shadow-hover: 0 4px 16px 0 rgba(0,0,0,.1);
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-width: 220px;
}

/* Dark theme */
[data-theme="dark"] {
  --bg-page: #141414;
  --bg-sidebar: #1d1d1d;
  --bg-header: #1d1d1d;
  --bg-card: #1d1d1d;
  --bg-input: #2a2a2a;
  --bg-hover: #2a2a3a;
  --bg-active: #1a2a3a;
  --text-primary: #e5eaf3;
  --text-regular: #cfd3dc;
  --text-secondary: #a3a6ad;
  --text-placeholder: #636466;
  --border-color: #333;
  --border-light: #2a2a2a;
  --shadow-card: 0 2px 12px 0 rgba(0,0,0,.3);
  --shadow-hover: 0 4px 16px 0 rgba(0,0,0,.4);
}

/* ========== Reset & Base ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
  font-size: 14px;
  color: var(--text-primary);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
}

/* ========== Layout ========== */
.app-container {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ========== Sidebar ========== */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  z-index: 10;
}
.sidebar-logo {
  padding: 18px 16px;
  font-size: 16px;
  font-weight: 700;
  color: var(--color-primary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.sidebar-logo span { font-size: 20px; }
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
.nav-group-title {
  padding: 12px 16px 6px;
  font-size: 11px;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  color: var(--text-regular);
  transition: all .2s;
  border-left: 3px solid transparent;
  margin: 2px 0;
  font-size: 13px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--bg-active);
  color: var(--color-primary);
  border-left-color: var(--color-primary);
  font-weight: 600;
}
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-item .dot {
  width: 7px; height: 7px; border-radius: 50%;
  margin-left: auto; flex-shrink: 0;
}
.nav-item .dot.dirty { background: var(--color-warning); }
.nav-item .dot.clean { background: transparent; }

/* ========== Main Area ========== */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ========== Header ========== */
.header {
  background: var(--bg-header);
  border-bottom: 1px solid var(--border-color);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.header-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.header-sub { font-size: 12px; color: var(--text-secondary); margin-left: 4px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

/* Status badge */
.status-badge {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; padding: 4px 12px; border-radius: 20px;
  background: var(--bg-input); color: var(--text-regular);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-dot.green { background: var(--color-success); box-shadow: 0 0 6px rgba(103,194,58,.4); }
.status-dot.red { background: var(--color-danger); box-shadow: 0 0 6px rgba(245,108,108,.4); }
.status-dot.yellow { background: var(--color-warning); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

/* Theme toggle */
.theme-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-color);
  background: var(--bg-input); cursor: pointer; font-size: 16px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; color: var(--text-regular);
}
.theme-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

/* Header action buttons */
.header-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-color);
  background: var(--bg-input); cursor: pointer; font-size: 12px; color: var(--text-regular);
  transition: all .2s; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.header-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.header-btn.primary {
  background: var(--color-primary); color: #fff; border-color: var(--color-primary);
}
.header-btn.primary:hover { background: var(--color-primary-light); }

/* ========== Content ========== */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

/* ========== Card ========== */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-light);
  margin-bottom: 16px;
  transition: box-shadow .2s;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-header h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-header .badge {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  background: var(--bg-active);
  color: var(--color-primary);
}

/* ========== Form ========== */
.form-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-light);
  transition: background .2s;
}
.form-item:last-child { border-bottom: none; }
.form-item:hover { background: var(--bg-hover); }
.form-item label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 8px;
}
.form-item .hint {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
  line-height: 1.4;
}
.form-item input[type="text"],
.form-item input[type="password"],
.form-item textarea,
.form-item select {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: border .2s, box-shadow .2s;
  font-family: inherit;
}
.form-item input:focus,
.form-item textarea:focus,
.form-item select:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(64,158,255,.2);
}
.form-item textarea {
  min-height: 80px;
  resize: vertical;
  line-height: 1.5;
}
.form-item input[type="number"] {
  width: 120px;
  padding: 8px 12px;
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  background: var(--bg-input);
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
  transition: border .2s;
}
.form-item input[type="number"]:focus { border-color: var(--color-primary); }

/* Switch */
.el-switch {
  position: relative; display: inline-flex; align-items: center;
  cursor: pointer; gap: 8px;
}
.el-switch input { display: none; }
.el-switch .track {
  width: 40px; height: 20px; border-radius: 10px;
  background: var(--border-color); transition: all .2s; position: relative;
}
.el-switch .track::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; transition: all .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.el-switch input:checked + .track { background: var(--color-primary); }
.el-switch input:checked + .track::after { left: 22px; }

/* Select */
.form-item select {
  appearance: auto;
  cursor: pointer;
  max-width: 240px;
}

/* ========== Footer Buttons ========== */
.footer-bar {
  padding: 16px 20px;
  border-top: 1px solid var(--border-light);
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  flex-shrink: 0;
}
.btn {
  padding: 9px 20px;
  border-radius: var(--radius);
  border: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-light); }
.btn-success { background: var(--color-success); color: #fff; }
.btn-success:hover { filter: brightness(1.1); }
.btn-warning { background: var(--color-warning); color: #fff; }
.btn-warning:hover { filter: brightness(1.1); }
.btn-default {
  background: var(--bg-input); color: var(--text-regular); border: 1px solid var(--border-color);
}
.btn-default:hover { color: var(--color-primary); border-color: var(--color-primary); }

/* ========== Toast ========== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: var(--radius);
  font-size: 14px; z-index: 9999;
  opacity: 0; transition: all .3s;
  pointer-events: none; white-space: nowrap;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}
.toast.show { opacity: 1; pointer-events: auto; }
.toast.info { background: var(--color-primary); color: #fff; }
.toast.success { background: var(--color-success); color: #fff; }
.toast.error { background: var(--color-danger); color: #fff; }
.toast.warning { background: var(--color-warning); color: #fff; }

/* ========== Modal ========== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 9998;
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-card); border-radius: var(--radius-lg);
  padding: 24px; max-width: 400px; width: 90%;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.modal-msg { font-size: 14px; color: var(--text-primary); margin-bottom: 20px; line-height: 1.6; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

/* ========== Empty State ========== */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; color: var(--text-secondary);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
.empty-state p { font-size: 14px; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; transition: left .3s; z-index: 100; }
  .sidebar.open { left: 0; }
  .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 99; display: none; }
  .sidebar-overlay.open { display: block; }
  .header { padding: 0 12px; }
  .header-title { font-size: 14px; }
  .content { padding: 12px; }
  .mobile-menu-btn { display: flex !important; }
}
.mobile-menu-btn { display: none; }

/* ========== Loading skeleton ========== */
.skeleton { animation: shimmer 1.5s infinite; background: linear-gradient(90deg, var(--bg-input) 25%, var(--bg-hover) 50%, var(--bg-input) 75%); background-size: 200% 100%; border-radius: var(--radius); }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<!-- Mobile sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app-container">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span>🪶</span> 羽笙管理
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Dynamically populated -->
    </nav>
  </aside>

  <!-- ===== Main ===== -->
  <div class="main-area">
    <!-- Header -->
    <header class="header">
      <button class="header-btn mobile-menu-btn" onclick="toggleSidebar()" style="border:none;background:transparent;font-size:20px;">☰</button>
      <span class="header-title">词库配置</span>
      <span class="header-sub" id="headerSub">加载中...</span>
      <div class="header-right">
        <span class="status-badge">
          <span class="status-dot yellow" id="statusDot"></span>
          <span id="statusText">检测中</span>
        </span>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
        <a class="header-btn" href="/yusheng/">← 返回</a>
      </div>
    </header>

    <!-- Content -->
    <div class="content" id="fieldsContainer">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>加载配置中...</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-bar" id="footerBar" style="display:none;">
      <div style="flex:1;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px;" id="footerInfo">
        <span id="footerPluginName"></span>
        <span class="dot" id="footerDirtyDot" style="width:7px;height:7px;border-radius:50%;background:transparent;"></span>
      </div>
      <button class="btn btn-primary" onclick="saveCurrent()">💾 保存</button>
      <button class="btn btn-success" onclick="saveAndRestart()">💾 保存 & 重启</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script>
// ========== Bot Number ==========
const botNum = window.location.pathname.match(/\/yusheng\/config/)?2:1;
fetch('/api/check-auth').then(r=>r.json()).then(d=>{if(!d.authenticated)window.location.href='/'}).catch(()=>window.location.href='/');
const botName = botNum === 1 ? '依星' : '羽笙';

// ========== State ==========
let currentPlugins = {};
let pluginKeys = [];
let activePlugin = null;
let dirtyPlugins = {};
let navGroups = {};  // {groupName: [pluginKey, ...]}

// ========== Theme ==========
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

// ========== Sidebar ==========
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// ========== Toast ==========
function showToast(msg, type) {
  type = type || 'info';
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}

// ========== Modal ==========
let modalCallback = null;
function showModal(msg, buttons) {
  document.getElementById('modalMsg').textContent = msg;
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = buttons.map((b,i) =>
    `<button class="btn ${b.cls||'btn-default'}" onclick="modalClick(${i})">${b.label}</button>`
  ).join('');
  document.getElementById('modal').classList.add('open');
  modalCallback = (idx) => {
    document.getElementById('modal').classList.remove('open');
    btns.innerHTML = '';
    if (buttons[idx]) buttons[idx].fn && buttons[idx].fn();
  };
}
function modalClick(idx) { if (modalCallback) { const cb = modalCallback; modalCallback = null; cb(idx); } }

// ========== Status ==========
async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot yellow';
  txt.textContent = '检测中';
  try {
    const r = await fetch(`/api/bot/${botNum}/status`);
    const d = await r.json();
    if (d.running) { dot.className = 'status-dot green'; txt.textContent = '运行中'; }
    else { dot.className = 'status-dot red'; txt.textContent = '已停止'; }
  } catch { dot.className = 'status-dot red'; txt.textContent = '连接失败'; }
}

// ========== Dirty Tracking ==========
function markClean(key) { dirtyPlugins[key] = false; updateNavDot(key); }
function markDirty(key) { dirtyPlugins[key] = true; updateNavDot(key); }
function isDirty(key) { return !!dirtyPlugins[key]; }
function anyDirty() { return Object.values(dirtyPlugins).some(v=>v); }
function updateNavDot(key) {
  const item = document.querySelector(`[data-plugin="${key}"] .dot`);
  if (item) item.className = 'dot ' + (isDirty(key) ? 'dirty' : 'clean');
  updateFooterDirty();
}
function updateFooterDirty() {
  const dot = document.getElementById('footerDirtyDot');
  if (activePlugin && isDirty(activePlugin)) {
    dot.style.background = 'var(--color-warning)';
  } else {
    dot.style.background = 'transparent';
  }
}

// ========== Render Sidebar ==========
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  const groups = {
    'wordlib': { group: '词库管理', icon: '🎯', order: 0 },
    'group_toggles': { group: '系统设置', icon: '⚙️', order: 1 },
  };

  // Custom icons per plugin key
  const pluginIcons = {
    'wordlib': '🎯',
    'group_toggles': '🔀',
  };
  const pluginGroups = {
    'wordlib': '词库管理',
    'group_toggles': '系统设置',
  };

  // Group plugins
  const grouped = {};
  for (const key of pluginKeys) {
    const g = pluginGroups[key] || '其他';
    if (!grouped[g]) grouped[g] = [];
    grouped[g].push(key);
  }

  let html = '';
  const groupOrder = ['词库管理', '系统设置', '其他'];
  for (const g of groupOrder) {
    if (!grouped[g]) continue;
    html += `<div class="nav-group-title">${g}</div>`;
    for (const key of grouped[g]) {
      const p = currentPlugins[key];
      const icon = pluginIcons[key] || '📄';
      html += `<div class="nav-item" data-plugin="${key}" onclick="switchPlugin('${key}')">
        <span class="icon">${icon}</span>
        ${p ? p.name : key}
        <span class="dot clean"></span>
      </div>`;
    }
  }
  nav.innerHTML = html;
}

// ========== Render Content ==========
function renderPlugin(key) {
  const plugin = currentPlugins[key];
  if (!plugin) return;
  activePlugin = key;

  // Update sidebar active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.plugin === key);
  });

  // Update footer
  document.getElementById('footerBar').style.display = 'flex';
  document.getElementById('footerPluginName').textContent = plugin.name;
  updateFooterDirty();

  const container = document.getElementById('fieldsContainer');
  let html = `<div class="card"><div class="card-header"><h3>${plugin.name}</h3><span class="badge">${plugin.fields.length} 项</span></div>`;

  for (const field of plugin.fields) {
    const fid = `f_${key}_${field.k}`;
    let inputHtml = '';

    if (field.t === 'num') {
      inputHtml = `<input type="number" id="${fid}" value="${field.v}" min="${field.min||0}" max="${field.max||''}" step="${field.s||1}">`;
    } else if (field.t === 'sel') {
      const opts = field.o.map(o => `<option value="${o}" ${String(o)===String(field.v)?'selected':''}>${o}</option>`).join('');
      inputHtml = `<select id="${fid}">${opts}</select>`;
    } else if (field.t === 'textlist') {
      const lines = Array.isArray(field.v) ? field.v.join('\n') : '';
      inputHtml = `<textarea id="${fid}" placeholder="每行一个">${lines}</textarea>`;
    } else if (field.t === 'password') {
      inputHtml = `<input type="password" id="${fid}" value="${field.v}" autocomplete="off">`;
    } else if (field.t === 'textarea') {
      inputHtml = `<textarea id="${fid}" style="min-height:120px">${field.v}</textarea>`;
    } else {
      inputHtml = `<input type="text" id="${fid}" value="${field.v}">`;
    }

    // For settings named "enabled" or containing "开启"/"开关" - use switch
    const isToggle = field.k.endsWith('_enabled') || field.k === 'enabled' || field.t === 'sel';
    if (isToggle && field.t === 'sel' && field.o && field.o.length === 2) {
      // Render as switch
      const checked = String(field.v) === 'true';
      inputHtml = `<label class="el-switch">
        <input type="checkbox" id="${fid}" ${checked?'checked':''} onchange="onFieldChange('${key}')">
        <span class="track"></span>
        <span style="font-size:12px;color:var(--text-secondary)">${checked?'已开启':'已关闭'}</span>
      </label>`;
    }

    html += `<div class="form-item"><label>${field.l}</label>${inputHtml}`;
    if (field.hint) html += `<div class="hint">${field.hint}</div>`;
    html += `</div>`;
  }

  html += '</div>';
  container.innerHTML = html;

  // Attach change tracking
  attachChangeTracking(key);
}

function onFieldChange(key) {
  if (!isDirty(key)) markDirty(key);
}

function attachChangeTracking(key) {
  if (!currentPlugins[key]) return;
  for (const field of currentPlugins[key].fields) {
    const el = document.getElementById(`f_${key}_${field.k}`);
    if (!el) continue;
    el.oninput = el.onchange = () => { if (!isDirty(key)) markDirty(key); };
  }
}

// ========== Plugin Switching ==========
function switchPlugin(key) {
  if (key === activePlugin) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); return; }
  if (activePlugin && isDirty(activePlugin)) {
    showModal('当前插件有未保存的修改，是否保存并切换？', [
      { label:'取消', cls:'btn-default', fn:()=>{} },
      { label:'保存并切换', cls:'btn-primary', fn:() => doSave(activePlugin, ()=>doSwitch(key)) }
    ]);
  } else {
    doSwitch(key);
  }
}
function doSwitch(key) {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  if (currentPlugins[key]) renderPlugin(key);
}

// ========== Load Config ==========
async function loadConfig() {
  document.getElementById('headerSub').textContent = `${botName} - 加载中...`;
  try {
    const r = await fetch(`/api/bot/${botNum}/plugins`);
    const d = await r.json();
    currentPlugins = d.plugins;
    document.getElementById('headerSub').textContent = `${d.bot.name} (QQ:${d.bot.qq})`;
    pluginKeys = Object.keys(d.plugins);
    dirtyPlugins = {};

    buildSidebar();

    if (pluginKeys.length > 0) renderPlugin(pluginKeys[0]);
    else document.getElementById('fieldsContainer').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无可用配置</p></div>';
  } catch (e) {
    document.getElementById('headerSub').textContent = '加载失败';
    showToast('❌ 加载失败: ' + e.message, 'error');
  }
}

// ========== Save ==========
function collectSingle(key) {
  const cfg = {};
  const plugin = currentPlugins[key];
  if (!plugin) return null;
  for (const field of plugin.fields) {
    const el = document.getElementById(`f_${key}_${field.k}`);
    if (!el) continue;
    if (field.t === 'num') cfg[field.k] = parseFloat(el.value);
    else if (field.t === 'textlist') cfg[field.k] = el.value.split('\n').map(s=>s.trim()).filter(s=>s);
    else if (el.type === 'checkbox') cfg[field.k] = el.checked ? 'true' : 'false';
    else cfg[field.k] = el.value;
  }
  return cfg;
}

async function doSave(key, then) {
  const cfg = collectSingle(key);
  if (!cfg) return;
  showToast('💾 保存中...', 'info');
  try {
    const r = await fetch(`/api/bot/${botNum}/config`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({plugin: key, cfg})
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '保存失败');
    markClean(key);
    showToast('✅ 已保存', 'success');
    checkStatus();
    if (then) then();
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  }
}

function saveCurrent() {
  if (!activePlugin) return;
  doSave(activePlugin);
}

async function saveAndRestart() {
  if (!activePlugin) return;
  const cfg = collectSingle(activePlugin);
  if (!cfg) return;
  showToast('💾 保存并重启中...', 'info');
  try {
    const r = await fetch(`/api/bot/${botNum}/config`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({plugin: activePlugin, cfg})
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '保存失败');
    markClean(activePlugin);
    showToast('✅ 已保存，正在重启...', 'success');
    setTimeout(async () => {
      try {
        await fetch(`/api/bot/${botNum}/restart`, { method: 'POST' });
        showToast('🔄 已发送重启指令', 'success');
        checkStatus();
      } catch(e) {
        showToast('❌ 重启失败: ' + e.message, 'error');
      }
    }, 500);
  } catch(e) {
    showToast('❌ ' + e.message, 'error');
  }
}

// ========== Init ==========
// Restore theme
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') {
  document.documentElement.setAttribute('data-theme', 'dark');
  document.getElementById('themeBtn').textContent = '☀️';
}

// Set bot name in logo
document.querySelector('.sidebar-logo span').textContent = botName === '依星' ? '⭐' : '🪶';
document.querySelector('.sidebar-logo').innerHTML = `<span>${botName === '依星' ? '⭐' : '🪶'}</span> ${botName}管理`;

checkStatus();
loadConfig();
setInterval(checkStatus, 15000);

// beforeunload
window.addEventListener('beforeunload', function(e) {
  if (anyDirty()) { e.preventDefault(); e.returnValue = ''; }
});
</script>
</body>
