<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>羽笙 - 系统配置</title><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪶</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#e0e0e0;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #333;position:sticky;top:0;z-index:10}
.menu-btn{background:none;border:none;color:#a0c4ff;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:background .2s}
.menu-btn:hover{background:rgba(160,196,255,.15)}
.header-title{font-size:16px;color:#fff;flex:1}
.header-right{display:flex;align-items:center;gap:10px}
.back-btn{background:none;border:1px solid #444;color:#aaa;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;transition:.2s;text-decoration:none}
.back-btn:hover{color:#fff;border-color:#888}
.header .sub{font-size:11px;color:#666}

/* overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:auto}

/* drawer */
.drawer{position:fixed;top:0;left:-280px;bottom:0;width:260px;background:#16162a;z-index:21;transition:left .3s;border-right:1px solid #333;overflow-y:auto}
.drawer.open{left:0}
.drawer-header{padding:18px 16px 12px;font-size:15px;font-weight:600;color:#a0c4ff;border-bottom:1px solid #333}
.drawer-item{padding:14px 16px;font-size:14px;color:#ccc;cursor:pointer;border-left:3px solid transparent;transition:.2s;display:flex;align-items:center;gap:10px}
.drawer-item:hover{background:rgba(160,196,255,.08);color:#fff}
.drawer-item.active{background:rgba(160,196,255,.12);color:#64c8ff;border-left-color:#64c8ff}
.drawer-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.drawer-item .dot.dirty{background:#fbbf24}
.drawer-item .dot.clean{background:transparent}

.section{margin:12px;background:#1a1a2e;border-radius:12px;overflow:hidden;border:1px solid #333}
.section-title{padding:14px 16px;font-size:15px;font-weight:600;color:#a0c4ff;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.section-title .badge{font-size:11px;background:rgba(100,200,255,0.2);color:#64c8ff;padding:2px 8px;border-radius:10px}
.field{padding:10px 16px;border-bottom:1px solid #222}
.field:last-child{border-bottom:none}
.field label{display:block;font-size:13px;color:#aaa;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:#242438;border:1px solid #444;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:14px;outline:none;transition:border .2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#64c8ff}
.field select{appearance:auto}
.field textarea{min-height:80px;resize:vertical;font-family:inherit}
.field .hint{font-size:11px;color:#666;margin-top:4px}
.btn-group{padding:16px;display:flex;gap:12px}
.btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .3s}
.btn:active{opacity:.7}
.btn-save{background:#64c8ff;color:#111}
.btn-restart{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff}
.status-bar{padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:13px;color:#888}
.status-dot{width:8px;height:8px;border-radius:50%}
.status-dot.green{background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.4)}
.status-dot.red{background:#f87171;box-shadow:0 0 6px rgba(248,113,113,.4)}
.status-dot.yellow{background:#fbbf24;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:100;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.empty{padding:40px 16px;text-align:center;color:#666;font-size:14px}

/* modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#1e1e34;border-radius:14px;padding:24px;max-width:360px;width:90%;border:1px solid #444}
.modal-msg{font-size:15px;color:#e0e0e0;margin-bottom:20px;line-height:1.5}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-btn{padding:9px 18px;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500}
.modal-btn.primary{background:#64c8ff;color:#111}
.modal-btn.default{background:#333;color:#ccc}
.modal-btn.primary:hover{opacity:.85}
.modal-btn.default:hover{background:#444}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">插件列表</div>
  <div id="drawerList"></div>
</div>

<div class="header">
  <button class="menu-btn" onclick="toggleDrawer()">☰</button>
  <div>
    <div class="header-title">⚙️ 系统配置</div>
    <div class="sub" id="headerSub">正在加载...</div>
  </div>
  <div class="header-right">
    <a class="back-btn" id="backBtn" href="/yusheng/">返回后台</a>
  </div>
</div>

<div class="status-bar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">检测中...</span>
  <span style="margin-left:auto;color:#555" id="botName"></span>
</div>

<div id="fieldsContainer"></div>

<div class="btn-group">
  <button class="btn btn-save" onclick="saveCurrent()">💾 保存</button>
  <button class="btn btn-restart" onclick="saveAndExit()">🚪 保存并退出</button>
</div>

<div id="toast" class="toast"></div>

<!-- modal -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script>
const botNum = window.location.pathname.match(/\/yusheng\/config/)?2:1;
fetch('/api/check-auth').then(r=>r.json()).then(d=>{if(!d.authenticated)window.location.href='/'}).catch(()=>window.location.href='/');
const botName = botNum === 1 ? '依星' : '羽笙';
let currentPlugins = {};
let pluginKeys = [];           // ordered plugin keys
let activePlugin = null;       // current plugin key
let dirtyPlugins = {};         // {key: true/false}
let snapshotValues = {};       // {key: {fieldK: value}} — original loaded values

document.getElementById('botName').textContent = botName;
checkStatus();

/******* status *******/
async function checkStatus() {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot yellow';
  txt.textContent = '检测中...';
  try {
    const r = await fetch(`/api/bot/${botNum}/status`);
    const d = await r.json();
    if (d.running) { dot.className = 'status-dot green'; txt.textContent = '● 运行中'; }
    else { dot.className = 'status-dot red'; txt.textContent = '● 已停止'; }
  } catch { dot.className = 'status-dot red'; txt.textContent = '无法连接'; }
}

/******* drawer *******/
function toggleDrawer() { document.getElementById('drawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

/******* modal *******/
let modalCallback = null;
function showModal(msg, buttons) {
  document.getElementById('modalMsg').textContent = msg;
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = buttons.map((b,i) => `<button class="modal-btn ${b.cls||'default'}" data-idx="${i}">${b.label}</button>`).join('');
  document.getElementById('modal').classList.add('open');
  modalCallback = (idx) => { document.getElementById('modal').classList.remove('open'); btns.innerHTML=''; if(buttons[idx]) buttons[idx].fn && buttons[idx].fn(); };
  btns.onclick = e => { const idx = e.target.dataset.idx; if(idx!==undefined) { const cb = modalCallback; modalCallback=null; cb(parseInt(idx)); }};
}

/******* field value snapshot *******/
function getFieldValue(key, field) {
  const el = document.getElementById(`f_${key}_${field.k}`);
  if (!el) return field.v;
  if (field.t === 'num') return parseFloat(el.value);
  if (field.t === 'textlist') return el.value.split('\n').map(s=>s.trim()).filter(s=>s);
  return el.value;
}
function getPluginValues(key) {
  const p = currentPlugins[key]; if (!p) return {};
  const vals = {};
  for (const f of p.fields) vals[f.k] = getFieldValue(key, f);
  return vals;
}
function valuesEqual(a, b) {
  try { return JSON.stringify(a) === JSON.stringify(b); } catch { return false; }
}
function markClean(key) { dirtyPlugins[key] = false; updateDot(key); }
function markDirty(key) { dirtyPlugins[key] = true; updateDot(key); }
function isDirty(key) { return !!dirtyPlugins[key]; }
function anyDirty() { return Object.values(dirtyPlugins).some(v=>v); }
function updateDot(key) {
  const item = document.querySelector(`[data-plugin-key="${key}"] .dot`);
  if (item) { item.className = 'dot ' + (isDirty(key) ? 'dirty' : 'clean'); }
}

/******* on change tracking *******/
function attachChangeTracking(key) {
  const p = currentPlugins[key]; if (!p) return;
  for (const f of p.fields) {
    const el = document.getElementById(`f_${key}_${f.k}`);
    if (!el) continue;
    el.oninput = el.onchange = () => { if (!isDirty(key)) { markDirty(key); } };
  }
}

/******* render one plugin *******/
function renderPlugin(key) {
  const plugin = currentPlugins[key]; if (!plugin) return;
  activePlugin = key;
  const container = document.getElementById('fieldsContainer');
  let html = '';
  for (const field of plugin.fields) {
    let inputHtml = '';
    const fid = `f_${key}_${field.k}`;
    if (field.t === 'num') {
      inputHtml = `<input type="number" id="${fid}" value="${field.v}" min="${field.min||0}" max="${field.max||''}" step="${field.s||1}">`;
    } else if (field.t === 'sel') {
      const opts = field.o.map(o => `<option value="${o}" ${o===field.v?'selected':''}>${o}</option>`).join('');
      inputHtml = `<select id="${fid}">${opts}</select>`;
    } else if (field.t === 'textlist') {
      const lines = Array.isArray(field.v) ? field.v.join('\n') : '';
      inputHtml = `<textarea id="${fid}">${lines}</textarea>`;
    } else if (field.t === 'password') {
      inputHtml = `<input type="password" id="${fid}" value="${field.v}" autocomplete="off">`;
    } else if (field.t === 'textarea') {
      inputHtml = `<textarea id="${fid}" style="min-height:120px">${field.v}</textarea>`;
    } else {
      inputHtml = `<input type="text" id="${fid}" value="${field.v}">`;
    }
    html += `<div class="field"><label>${field.l}</label>${inputHtml}${field.hint?`<div class="hint">${field.hint}</div>`:''}</div>`;
  }
  container.innerHTML = `<div class="section"><div class="section-title"><span>${plugin.name}</span><span class="badge">${plugin.fields.length} 项</span></div>${html}</div>`;
  attachChangeTracking(key);
  // highlight active in drawer
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.toggle('active', el.dataset.pluginKey === key));
}

/******* switch plugin *******/
function switchPlugin(key) {
  if (key === activePlugin) { closeDrawer(); return; }
  if (activePlugin && isDirty(activePlugin)) {
    closeDrawer();
    showModal('当前插件有未保存的修改，是否保存并切换？', [
      { label:'取消', cls:'default', fn:()=>{} },
      { label:'保存并切换', cls:'primary', fn:() => doSave(activePlugin, ()=>doSwitch(key)) }
    ]);
  } else {
    doSwitch(key);
  }
}
function doSwitch(key) {
  closeDrawer();
  if (currentPlugins[key]) renderPlugin(key);
}

/******* load *******/
async function loadConfig() {
  document.getElementById('headerSub').textContent = `${botName} - 加载中...`;
  try {
    const r = await fetch(`/api/bot/${botNum}/plugins`);
    const d = await r.json();
    currentPlugins = d.plugins;
    document.getElementById('headerSub').textContent = `${d.bot.name} (QQ:${d.bot.qq})`;
    pluginKeys = Object.keys(d.plugins);
    dirtyPlugins = {};
    snapshotValues = {};

    // drawer list
    const dl = document.getElementById('drawerList');
    dl.innerHTML = pluginKeys.map(k => {
      const p = d.plugins[k];
      return `<div class="drawer-item" data-plugin-key="${k}" onclick="switchPlugin('${k}')"><span class="dot clean"></span>${p.name}</div>`;
    }).join('');

    // load first plugin
    if (pluginKeys.length > 0) renderPlugin(pluginKeys[0]);
    else document.getElementById('fieldsContainer').innerHTML = '<div class="empty">暂无可配置的插件</div>';
  } catch (e) {
    document.getElementById('headerSub').textContent = '加载失败';
    showToast('❌ 加载配置失败: ' + e.message);
  }
}

/******* collect & save a single plugin *******/
function collectSingle(key) {
  const cfg = {};
  const plugin = currentPlugins[key];
  if (!plugin) return null;
  for (const field of plugin.fields) {
    const el = document.getElementById(`f_${key}_${field.k}`);
    if (!el) continue;
    let val;
    if (field.t === 'num') val = parseFloat(el.value);
    else if (field.t === 'textlist') val = el.value.split('\n').map(s=>s.trim()).filter(s=>s);
    else val = el.value;
    cfg[field.k] = val;
  }
  return cfg;
}
async function doSave(key, then) {
  const cfg = collectSingle(key);
  if (!cfg) return;
  showToast('💾 正在保存...');
  try {
    const r = await fetch(`/api/bot/${botNum}/config`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({plugin:key, cfg}) });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '保存失败');
    markClean(key);
    showToast('✅ 已保存');
    checkStatus();
    if (then) then();
  } catch(e) { showToast('❌ ' + e.message); }
}
function saveCurrent() {
  if (!activePlugin) return;
  doSave(activePlugin);
}
async function saveAll(then) {
  let ok = true;
  for (const key of pluginKeys) {
    if (!isDirty(key)) continue;
    const cfg = collectSingle(key);
    if (!cfg) continue;
    try {
      const r = await fetch(`/api/bot/${botNum}/config`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({plugin:key, cfg}) });
      const d = await r.json();
      if (!d.ok) throw new Error(d.error);
      markClean(key);
    } catch(e) { showToast('❌ 保存 ' + key + ' 失败: ' + e.message); ok = false; }
  }
  if (then) then(ok);
}

/******* save & exit (save current plugin, then go back) *******/
async function saveAndExit() {
  if (!activePlugin) return;
  const cfg = collectSingle(activePlugin);
  if (!cfg) return;
  showToast('💾 保存中...');
  try {
    const r = await fetch(`/api/bot/${botNum}/config`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({plugin:activePlugin, cfg}) });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error);
    markClean(activePlugin);
    showToast('✅ 已保存');
    setTimeout(() => { window.location.href = document.getElementById('backBtn').href; }, 500);
  } catch(e) { showToast('❌ ' + e.message); }
}

/******* back button *******/
function onBack() {
  if (anyDirty()) {
    showModal('有配置未保存，是否保存并退出？', [
      { label:'取消', cls:'default', fn:()=>{} },
      { label:'保存并退出', cls:'primary', fn:() => saveAll(() => window.location.href = document.getElementById('backBtn').href) }
    ]);
    return false;
  }
  return true;
}
document.getElementById('backBtn').onclick = function(e) {
  if (!onBack()) e.preventDefault();
};

/******* beforeunload *******/
window.addEventListener('beforeunload', function(e) {
  if (anyDirty()) { e.preventDefault(); e.returnValue = ''; }
});

/******* toast *******/
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}

loadConfig();
setInterval(checkStatus, 10000);
</script>
</body>
</html>
