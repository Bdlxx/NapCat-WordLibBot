<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>羽笙 - 管理面板</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪶</text></svg>">
<style>
/* ========== CSS Variables ========== */
:root {
  --bg-page: #f0f2f5; --bg-sidebar: #fff; --bg-header: #fff; --bg-card: #fff;
  --bg-input: #f5f7fa; --bg-hover: #f0f2ff; --bg-active: #ecf5ff;
  --bg-warning-light: #fdf6ec;
  --text-primary: #303133; --text-regular: #606266; --text-secondary: #909399;
  --border-color: #e4e7ed; --border-light: #ebeef5;
  --color-primary: #409eff; --color-primary-light: #66b1ff;
  --color-success: #67c23a; --color-warning: #e6a23c; --color-danger: #f56c6c;
  --color-info: #909399;
  --shadow-card: 0 2px 12px 0 rgba(0,0,0,.06);
  --radius: 8px; --radius-lg: 12px; --sidebar-width: 220px;
}
[data-theme="dark"] {
  --bg-page: #141414; --bg-sidebar: #1d1d1d; --bg-header: #1d1d1d; --bg-card: #1d1d1d;
  --bg-input: #2a2a2a; --bg-hover: #2a2a3a; --bg-active: #1a2a3a; --bg-warning-light: #2a2a1a;
  --text-primary: #e5eaf3; --text-regular: #cfd3dc; --text-secondary: #a3a6ad;
  --border-color: #333; --border-light: #2a2a2a;
  --shadow-card: 0 2px 12px 0 rgba(0,0,0,.3);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
  font-size: 14px; color: var(--text-primary); background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--color-primary); text-decoration: none; }
a:hover { color: var(--color-primary-light); }

/* ===== Layout ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width); background: var(--bg-sidebar);
  border-right: 1px solid var(--border-color);
  display: flex; flex-direction: column; flex-shrink: 0; z-index: 10;
}
.sidebar-logo {
  padding: 18px 16px; font-size: 16px; font-weight: 700;
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-logo .logo-text { color: var(--color-primary); }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
.nav-group-title {
  padding: 14px 16px 6px; font-size: 11px; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; cursor: pointer; color: var(--text-regular);
  transition: all .2s; border-left: 3px solid transparent;
  margin: 2px 0; font-size: 13px; border-radius: 0 8px 8px 0;
  margin-right: 8px;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active {
  background: var(--bg-active); color: var(--color-primary);
  border-left-color: var(--color-primary); font-weight: 600;
}
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-item .badge {
  margin-left: auto; font-size: 11px; padding: 1px 6px; border-radius: 10px;
  background: var(--color-danger); color: #fff; font-weight: 500;
}

/* ===== Main ===== */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ===== Header ===== */
.header {
  background: var(--bg-header); border-bottom: 1px solid var(--border-color);
  padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.header-breadcrumb { font-size: 14px; color: var(--text-secondary); }
.header-breadcrumb .current { color: var(--text-primary); font-weight: 500; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

/* Status badge */
.el-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 500;
}
.el-tag.success { background: rgba(103,194,58,.15); color: var(--color-success); }
.el-tag.danger { background: rgba(245,108,108,.15); color: var(--color-danger); }
.el-tag.warning { background: rgba(230,162,60,.15); color: var(--color-warning); }
.el-tag.info { background: rgba(144,147,153,.15); color: var(--color-info); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.status-dot.green { background: var(--color-success); }
.status-dot.red { background: var(--color-danger); }
.status-dot.yellow { background: var(--color-warning); animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

.theme-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border-color);
  background: var(--bg-input); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; color: var(--text-regular);
  transition: all .2s;
}
.theme-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.header-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-color);
  background: var(--bg-input); cursor: pointer; font-size: 12px; color: var(--text-regular);
  transition: all .2s; text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.header-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }

/* ===== Content ===== */
.content { flex: 1; overflow-y: auto; padding: 20px; }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

/* ===== Cards ===== */
.card {
  background: var(--bg-card); border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card); border: 1px solid var(--border-light);
  margin-bottom: 16px; transition: box-shadow .2s;
}
.card-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: space-between;
}
.card-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-header .badge {
  font-size: 11px; padding: 2px 10px; border-radius: 10px;
  background: var(--bg-active); color: var(--color-primary);
}
.card-body { padding: 16px 20px; }

/* ===== Stat Cards ===== */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg-card); border-radius: var(--radius-lg);
  padding: 20px; box-shadow: var(--shadow-card);
  border: 1px solid var(--border-light);
  display: flex; align-items: flex-start; gap: 16px;
  transition: box-shadow .2s;
}
.stat-card:hover { box-shadow: var(--shadow-hover); }
.stat-icon {
  width: 44px; height: 44px; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center; font-size: 22px;
  flex-shrink: 0;
}
.stat-icon.blue { background: rgba(64,158,255,.12); }
.stat-icon.green { background: rgba(103,194,58,.12); }
.stat-icon.orange { background: rgba(230,162,60,.12); }
.stat-icon.purple { background: rgba(144,107,224,.12); }
.stat-info { flex: 1; min-width: 0; }
.stat-info .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.stat-info .value { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.stat-info .desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* ===== Form ===== */
.form-item {
  padding: 14px 20px; border-bottom: 1px solid var(--border-light);
  transition: background .2s;
}
.form-item:last-child { border-bottom: none; }
.form-item label {
  display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px;
}
.form-item .hint {
  font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4;
}
.form-item input[type="text"],
.form-item input[type="password"],
.form-item textarea,
.form-item select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border-color);
  border-radius: var(--radius); background: var(--bg-input);
  color: var(--text-primary); font-size: 13px; outline: none;
  transition: border .2s, box-shadow .2s; font-family: inherit;
}
.form-item input:focus, .form-item textarea:focus, .form-item select:focus {
  border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(64,158,255,.2);
}
.form-item textarea { min-height: 80px; resize: vertical; line-height: 1.5; }
.form-item input[type="number"] {
  width: 120px; padding: 8px 12px; border: 1px solid var(--border-color);
  border-radius: var(--radius); background: var(--bg-input);
  color: var(--text-primary); font-size: 13px; outline: none;
}

/* Switch */
.el-switch { position: relative; display: inline-flex; align-items: center; cursor: pointer; gap: 8px; }
.el-switch input { display: none; }
.el-switch .track {
  width: 40px; height: 20px; border-radius: 10px;
  background: var(--border-color); transition: all .2s; position: relative;
}
.el-switch .track::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; transition: all .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.el-switch input:checked + .track { background: var(--color-primary); }
.el-switch input:checked + .track::after { left: 22px; }

/* ===== Buttons ===== */
.footer-bar {
  padding: 16px 20px; border-top: 1px solid var(--border-light);
  display: flex; gap: 12px; align-items: center; flex-shrink: 0;
}
.btn {
  padding: 9px 20px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 500; cursor: pointer;
  transition: all .2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-light); }
.btn-success { background: var(--color-success); color: #fff; }
.btn-success:hover { filter: brightness(1.1); }
.btn-warning { background: var(--color-warning); color: #fff; }
.btn-danger { background: var(--color-danger); color: #fff; }
.btn-default { background: var(--bg-input); color: var(--text-regular); border: 1px solid var(--border-color); }
.btn-default:hover { color: var(--color-primary); border-color: var(--color-primary); }

/* ===== Toast ===== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: var(--radius); font-size: 14px; z-index: 9999;
  opacity: 0; transition: all .3s; pointer-events: none;
  box-shadow: 0 4px 12px rgba(0,0,0,.15); white-space: nowrap;
}
.toast.show { opacity: 1; pointer-events: auto; }
.toast.success { background: var(--color-success); color: #fff; }
.toast.error { background: var(--color-danger); color: #fff; }
.toast.warning { background: var(--color-warning); color: #fff; }
.toast.info { background: var(--color-primary); color: #fff; }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 9998;
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg-card); border-radius: var(--radius-lg);
  padding: 24px; max-width: 400px; width: 90%;
  box-shadow: 0 8px 24px rgba(0,0,0,.2);
}
.modal-msg { font-size: 14px; margin-bottom: 20px; line-height: 1.6; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }

/* ===== Table ===== */
.el-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.el-table th {
  padding: 12px 16px; text-align: left; font-weight: 600;
  background: var(--bg-input); color: var(--text-regular);
  border-bottom: 1px solid var(--border-color);
}
.el-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-light); }
.el-table tr:hover td { background: var(--bg-hover); }

/* ===== Tabs ===== */
.el-tabs { margin-bottom: 16px; }
.el-tabs-header {
  display: flex; gap: 0; border-bottom: 1px solid var(--border-color);
  margin-bottom: 16px;
}
.el-tab {
  padding: 10px 20px; cursor: pointer; font-size: 14px;
  color: var(--text-regular); border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all .2s;
}
.el-tab:hover { color: var(--color-primary); }
.el-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 500; }

/* ===== Empty ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: .4; }

/* ===== Log viewer ===== */
.log-viewer {
  background: #1e1e1e; color: #d4d4d4; font-family: 'Consolas', 'Monaco', monospace;
  font-size: 12px; padding: 16px; border-radius: var(--radius);
  max-height: 500px; overflow-y: auto; line-height: 1.6; white-space: pre-wrap; word-break: break-all;
}
.log-viewer .time { color: #6a9955; }
.log-viewer .info { color: #9cdcfe; }
.log-viewer .warn { color: #ce9178; }
.log-viewer .error { color: #f44747; }
.log-line { padding: 0; }
.log-line:hover { background: rgba(255,255,255,.03); }

/* ===== Loading ===== */
.loading-skeleton { animation: shimmer 1.5s infinite; background: linear-gradient(90deg, var(--bg-input) 25%, var(--bg-hover) 50%, var(--bg-input) 75%); background-size: 200% 100%; border-radius: var(--radius); height: 20px; margin: 8px 0; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; transition: left .3s; z-index: 100; }
  .sidebar.open { left: 0; }
  .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.4); z-index: 99; display: none; }
  .sidebar-overlay.open { display: block; }
  .header { padding: 0 12px; }
  .content { padding: 12px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .mobile-menu-btn { display: flex !important; }
}
.mobile-menu-btn { display: none; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="app">
  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo" style="flex-direction:column;align-items:flex-start;gap:2px;">
      <div style="display:flex;align-items:center;gap:8px;width:100%;">
        <img id="botAvatar" src="" style="width:36px;height:36px;border-radius:50%;background:var(--bg-input);flex-shrink:0" alt="">
        <div style="min-width:0;flex:1;">
          <div class="logo-text" id="botName" style="font-size:14px;">加载中...</div>
          <div style="font-size:11px;color:var(--text-secondary);" id="botQQ"></div>
        </div>
      </div>
    </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- ===== Main ===== -->
  <div class="main">
    <header class="header">
      <button class="header-btn mobile-menu-btn" onclick="toggleSidebar()" style="border:none;background:transparent;font-size:18px;">☰</button>
      <div class="header-breadcrumb" id="breadcrumb"><span class="current">仪表盘</span></div>
      <div class="header-right">
        <span class="el-tag" id="statusTag"><span class="status-dot yellow"></span> 检测中</span>
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
        <a class="header-btn" href="/yusheng/">← 返回首页</a>
      </div>
    </header>

    <div class="content" id="pageContent"></div>

    <div class="footer-bar" id="footerBar" style="display:none;">
      <span style="font-size:12px;color:var(--text-secondary);" id="footerInfo"></span>
      <div style="margin-left:auto;display:flex;gap:8px;" id="footerActions"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-btns" id="modalBtns"></div>
  </div>
</div>

<script>
// ===== Config =====
const botNum = window.location.pathname.match(/\/yusheng\/config/)?2:1;
const BOT_NAME = botNum === 1 ? '依星' : '羽笙';
fetch('/api/check-auth').then(r=>r.json()).then(d=>{if(!d.authenticated)window.location.href='/'}).catch(()=>window.location.href='/');

// API 请求辅助函数（超时 + CSRF 头）
function apiFetch(url, opts, timeoutMs) {
  timeoutMs = timeoutMs || 15000;
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['X-Requested-With'] = 'XMLHttpRequest';
  const controller = new AbortController();
  opts.signal = controller.signal;
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  return fetch(url, opts).then(r => { clearTimeout(timer); return r; }).catch(e => {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('请求超时');
    throw e;
  });
}


// ===== Theme =====
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('themeBtn').textContent = '☀️'; }
// Fix logo
apiFetch("/api/bot/" + botNum + "/info",{},8000).then(r=>r.json()).then(d=>{if(d.success){document.getElementById("botAvatar").src="https://q1.qlogo.cn/g?b=qq&nk="+d.qq+"&s=640";document.getElementById("botName").textContent=d.name||BOT_NAME;document.getElementById("botQQ").textContent="QQ "+d.qq;}}).catch(()=>{document.getElementById("botName").textContent=BOT_NAME;});

// ===== SPA Router =====
let currentPage = 'config';
let pageData = {};

function navigate(page) {
  currentPage = page;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  renderPage();
}

const NAV_ITEMS = [
  { id: 'dashboard', icon: '📊', label: '仪表盘', group: '概览' },
  { id: 'config',    icon: '⚙️',  label: '词库配置', group: '管理' },
  { id: 'groups',    icon: '👥',  label: '群组开关', group: '管理' },
  { id: 'logs',      icon: '📋',  label: '运行日志', group: '管理' },
];

function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  const groups = {};
  for (const item of NAV_ITEMS) {
    if (!groups[item.group]) groups[item.group] = [];
    groups[item.group].push(item);
  }
  let html = '';
  for (const [g, items] of Object.entries(groups)) {
    html += `<div class="nav-group-title">${g}</div>`;
    for (const item of items) {
      const active = currentPage === item.id ? 'active' : '';
      html += `<div class="nav-item ${active}" data-page="${item.id}" onclick="navigate('${item.id}')">
        <span class="icon">${item.icon}</span> ${item.label}
      </div>`;
    }
  }
  nav.innerHTML = html;
}

function updateBreadcrumb(title) {
  document.getElementById('breadcrumb').innerHTML = `<span class="current">${title}</span>`;
}
function updateSidebarActive() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === currentPage);
  });
}

function showFooter(info, actions) {
  const bar = document.getElementById('footerBar');
  if (!info && !actions) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  document.getElementById('footerInfo').textContent = info || '';
  document.getElementById('footerActions').innerHTML = (actions || []).map(a =>
    `<button class="btn ${a.cls || 'btn-default'}" onclick="(${a.fn})()">${a.label}</button>`
  ).join('');
}

// ===== Toast & Modal =====
function showToast(msg, type) {
  type = type || 'info';
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 3000);
}
let modalCallback = null;
function showModal(msg, buttons) {
  document.getElementById('modalMsg').textContent = msg;
  const btns = document.getElementById('modalBtns');
  btns.innerHTML = buttons.map((b,i) => `<button class="btn ${b.cls||'btn-default'}" onclick="modalClick(${i})">${b.label}</button>`).join('');
  document.getElementById('modal').classList.add('open');
  modalCallback = (idx) => { document.getElementById('modal').classList.remove('open'); btns.innerHTML=''; if(buttons[idx]) buttons[idx].fn && buttons[idx].fn(); };
}
function modalClick(idx) { if (modalCallback) { const cb = modalCallback; modalCallback=null; cb(idx); } }

// ===== Status =====
async function fetchStatus() {
  const tag = document.getElementById('statusTag');
  try {
    const r = await apiFetch(`/api/bot/${botNum}/status`);
    const d = await r.json();
    if (d.running) { tag.innerHTML = '<span class="status-dot green"></span> 运行中'; tag.className = 'el-tag success'; }
    else { tag.innerHTML = '<span class="status-dot red"></span> 已停止'; tag.className = 'el-tag danger'; }
  } catch {
    tag.innerHTML = '<span class="status-dot yellow"></span> 连接失败'; tag.className = 'el-tag warning';
  }
}

// ===== Sidebar =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');

async function quickAction(action) {
  if (action === 'restart') {
    showToast('🔄 正在重启 Bot...', 'info');
    try {
      await fetch(`/api/bot/${botNum}/restart`, { method: 'POST' });
      showToast('✅ 已发送重启指令', 'success');
      setTimeout(fetchStatus, 2000);
    } catch(e) { showToast('❌ ' + e.message, 'error'); }
  } else if (action === 'napcat') {
    showToast('🐱 正在重启 NapCat...', 'info');
    try {
      const container = botNum === 1 ? 'napcat' : 'napcat2';
      await fetch(`/api/bot/${botNum}/restart`, { method: 'POST' });
      showToast('✅ 已发送 NapCat 重启指令', 'success');
    } catch(e) { showToast('❌ ' + e.message, 'error'); }
  } else if (action === 'log') {
    navigate('logs');
  }
}

// ==========================================================
// PAGE: Config
// ==========================================================
let configPlugins = {};
let configKeys = [];
let activePlugin = null;
let dirtyPlugins = {};

function isDirty(key) { return !!dirtyPlugins[key]; }
function markClean(key) { dirtyPlugins[key] = false; }
function markDirty(key) { dirtyPlugins[key] = true; }

async function renderConfig() {
  updateBreadcrumb('插件配置');
  updateSidebarActive();
  document.getElementById('pageContent').innerHTML = '<div class="loading-skeleton" style="height:200px;"></div>';

  try {
    const r = await apiFetch('/api/bot/' + botNum + '/plugins');
    const d = await r.json();
    configPlugins = {};
    for (const [key, val] of Object.entries(d.plugins)) {
      if (key !== '_toggles') configPlugins[key] = val;
    }
    configKeys = Object.keys(configPlugins);
    dirtyPlugins = {};

    if (configKeys.length === 0) {
      document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无可用配置</p></div>';
      showFooter(null, null);
      return;
    }

    // Build tabs
    let tabsHtml = '<div class="el-tabs"><div class="el-tabs-header">';
    for (const key of configKeys) {
      const p = configPlugins[key];
      tabsHtml += '<div class="el-tab" data-tab="' + key + '">' + (p.name_cn||key) + '</div>';
    }
    tabsHtml += '</div></div><div id="configContent"></div>';
    document.getElementById('pageContent').innerHTML = tabsHtml;

    // Footer with save buttons
    showFooter('修改后记得保存', [
      { label: '💾 保存', cls: 'btn-primary', fn: '() => saveCurrentConfig()' },
      { label: '💾 保存并重启', cls: 'btn-success', fn: '() => saveAndRestartConfig()' },
    ]);

    // Show first tab
    switchConfigTab(configKeys[0]);
  } catch (e) {
    document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
    showFooter(null, null);
  }
}

function switchConfigTab(key) {
  activePlugin = key;
  document.querySelectorAll('.el-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === key));

  const plugin = configPlugins[key];
  if (!plugin) return;

  let html = '<div class="card"><div class="card-header"><h3>' + (plugin.name_cn||key) + '</h3><span class="badge">' + (plugin.fields?plugin.fields.length:'0') + ' 项</span></div>';
  if (plugin.name_en) {
    html += '<div style="padding:0 20px 8px;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--border-light)">' + plugin.name_en + '</div>';
  }

  if (!plugin.has_config || !plugin.fields || plugin.fields.length === 0) {
    html += '<div class="card-body"><div style="text-align:center;padding:30px;color:var(--text-secondary)">📭 该插件无可配置项</div></div></div>';
    document.getElementById('configContent').innerHTML = html;
    return;
  }

  for (const field of plugin.fields) {
    const fid = 'f_' + key + '_' + field.k;
    let inputHtml = '';

    if (field.t === 'num') {
      inputHtml = '<input type="number" id="' + fid + '" value="' + field.v + '" min="' + (field.min||0) + '" max="' + (field.max||'') + '" step="' + (field.s||1) + '">';
    } else if (field.t === 'sel' && field.o && field.o.length === 2 && field.o.includes('true') && field.o.includes('false')) {
      const checked = String(field.v) === 'true';
      inputHtml = '<label class="el-switch"><input type="checkbox" id="' + fid + '" ' + (checked?'checked':'') + ' onchange="onConfigChange()"><span class="track"></span><span style="font-size:12px;color:var(--text-secondary)">' + (checked?'已开启':'已关闭') + '</span></label>';
    } else if (field.t === 'sel') {
      const opts = field.o.map(o => '<option value="' + o + '" ' + (String(o)===String(field.v)?'selected':'') + '>' + o + '</option>').join('');
      inputHtml = '<select id="' + fid + '">' + opts + '</select>';
    } else if (field.t === 'textlist') {
      const lines = Array.isArray(field.v) ? field.v.join('\n') : '';
      inputHtml = '<textarea id="' + fid + '" placeholder="每行一个">' + lines + '</textarea>';
    } else if (field.t === 'password') {
      inputHtml = '<input type="password" id="' + fid + '" value="' + field.v + '" autocomplete="off">';
    } else if (field.t === 'textarea') {
      inputHtml = '<textarea id="' + fid + '" style="min-height:120px">' + field.v + '</textarea>';
    } else {
      inputHtml = '<input type="text" id="' + fid + '" value="' + (field.v || '') + '">';
    }

    html += '<div class="form-item"><label>' + field.l + '</label>' + inputHtml;
    if (field.hint) html += '<div class="hint">' + field.hint + '</div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('configContent').innerHTML = html;

  // Attach change events
  for (const field of plugin.fields) {
    const el = document.getElementById('f_' + key + '_' + field.k);
    if (el) el.oninput = el.onchange = function() { if (!isDirty(key)) { markDirty(key); } };
  }
}

function onConfigChange() {
  if (activePlugin && !isDirty(activePlugin)) markDirty(activePlugin);
}

function collectConfig(key) {
  const cfg = {};
  const plugin = configPlugins[key];
  if (!plugin) return null;
  for (const field of plugin.fields) {
    const el = document.getElementById('f_' + key + '_' + field.k);
    if (!el) continue;
    if (field.t === 'num') cfg[field.k] = parseFloat(el.value);
    else if (field.t === 'textlist') cfg[field.k] = el.value.split('\n').map(s=>s.trim()).filter(s=>s);
    else if (el.type === 'checkbox') cfg[field.k] = el.checked ? 'true' : 'false';
    else cfg[field.k] = el.value;
  }
  return cfg;
}

async function saveCurrentConfig() {
  if (!activePlugin) return;
  const cfg = collectConfig(activePlugin);
  if (!cfg) return;
  showToast('💾 保存中...', 'info');
  try {
    const r = await apiFetch('/api/bot/' + botNum + '/config', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({plugin: activePlugin, cfg})
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '保存失败');
    markClean(activePlugin);
    showToast('✅ 已保存', 'success');
    fetchStatus();
  } catch(e) { showToast('❌ ' + e.message, 'error'); }
}

async function saveAndRestartConfig() {
  if (!activePlugin) return;
  const cfg = collectConfig(activePlugin);
  if (!cfg) return;
  showToast('💾 保存中...', 'info');
  try {
    const r = await apiFetch('/api/bot/' + botNum + '/config', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({plugin: activePlugin, cfg})
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || '保存失败');
    markClean(activePlugin);
    showToast('✅ 已保存，正在重启...', 'success');
    setTimeout(async () => {
      await apiFetch('/api/bot/' + botNum + '/restart', { method: 'POST' });
      showToast('🔄 已重启', 'success');
      fetchStatus();
    }, 500);
  } catch(e) { showToast('❌ ' + e.message, 'error'); }
}

// ==========================================================
// PAGE: Groups
// ==========================================================
async function renderGroups() {
  updateBreadcrumb('群组开关');
  updateSidebarActive();
  showFooter(null, null);
  document.getElementById('pageContent').innerHTML = '<div class="loading-skeleton" style="height:200px;"></div>';

  try {
    const r = await apiFetch('/api/bot/' + botNum + '/plugins');
    const d = await r.json();
    const tg = d.plugins._toggles;

    if (!tg || !tg.groups || !tg.groups.length) {
      document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">🔀</div><p>暂无群组数据</p><div style="margin-top:8px;font-size:12px;">在群内发送「开启词库」等命令后自动生成</div></div>';
      return;
    }

    const groups = tg.groups;
    const plugins = tg.plugins;
    const toggles = tg.toggles;
    const meta = tg._pluginMeta || {};

    // 初始化本地状态
    if (!window._tgState) window._tgState = {};
    for (const g of groups) {
      if (!window._tgState[g]) window._tgState[g] = {};
      for (const p of plugins) {
        window._tgState[g][p] = toggles[g] ? !!toggles[g][p] : false;
      }
    }

    let html = '<div class="card"><div class="card-header"><h3>👥 分群插件开关</h3><span class="badge">' + groups.length + ' 个群</span></div>';
    html += '<div class="card-body" style="overflow-x:auto"><table class="el-table" style="min-width:600px"><thead><tr><th style="position:sticky;left:0;background:var(--bg-card);z-index:1">群号</th>';
    for (const p of plugins) {
      const m = meta[p] || {};
      html += '<th style="text-align:center;min-width:90px">' + (m.name_cn||p) + '<br><span style="font-weight:400;font-size:11px;color:var(--text-secondary)">' + p + '</span></th>';
    }
    html += '<th style="text-align:center;min-width:70px">全选</th></tr></thead><tbody>';

    // 全选行
    html += '<tr style="background:var(--bg-active)"><td style="font-weight:600">全选</td>';
    for (const p of plugins) {
      const allChecked = groups.every(g => window._tgState[g][p]);
      html += '<td style="text-align:center"><label class="el-switch"><input type="checkbox" ' + (allChecked?'checked':'') + ' onchange="tgToggleAllPlugin(\'' + p + '\',this.checked)"><span class="track"></span></label></td>';
    }
    html += '<td style="text-align:center"><label class="el-switch"><input type="checkbox" onchange="tgToggleAll(this.checked)"><span class="track"></span></label></td></tr>';

    // 数据行
    for (const g of groups) {
      const gAll = plugins.every(p => window._tgState[g][p]);
      html += '<tr><td style="font-weight:500;position:sticky;left:0;background:var(--bg-card)">' + g + '</td>';
      for (const p of plugins) {
        const ch = window._tgState[g][p];
        html += '<td style="text-align:center"><label class="el-switch"><input type="checkbox" ' + (ch?'checked':'') + ' onchange="tgToggle(\'' + g + '\',\'' + p + '\',this.checked)"><span class="track"></span></label></td>';
      }
      html += '<td style="text-align:center"><label class="el-switch"><input type="checkbox" ' + (gAll?'checked':'') + ' onchange="tgToggleGroup(\'' + g + '\',this.checked)"><span class="track"></span></label></td></tr>';
    }
    html += '</tbody></table></div></div>';
    html += '<div style="display:flex;gap:10px;"><button class="btn btn-primary" onclick="tgSave()">💾 保存</button><button class="btn btn-default" onclick="renderGroups()">🔄 刷新</button></div>';
    html += '<div class="card" style="margin-top:16px"><div class="card-header"><h3>💡 说明</h3></div><div class="card-body" style="font-size:13px;color:var(--text-secondary);line-height:1.8;">所有插件在每个群默认关闭。<br>在群内发送对应命令开启：<code>开启词库</code> / <code>关闭词库</code><br>私聊发送 = 全局控制。横向「全选」列控制单个插件在所有群的状态，纵向「全选」行控制单个群的所有插件。</div></div>';
    document.getElementById('pageContent').innerHTML = html;
  } catch (e) {
    document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
  }
}

// ===== 群组开关辅助函数 =====
function tgToggle(gid, plugin, checked) {
  if (!window._tgState) return;
  if (!window._tgState[gid]) window._tgState[gid] = {};
  window._tgState[gid][plugin] = checked;
}
function tgToggleGroup(gid, checked) {
  if (!window._tgState || !window._tgState[gid]) return;
  for (const p of Object.keys(window._tgState[gid])) {
    window._tgState[gid][p] = checked;
  }
  renderGroups();
}
function tgToggleAllPlugin(plugin, checked) {
  if (!window._tgState) return;
  for (const g of Object.keys(window._tgState)) {
    window._tgState[g][plugin] = checked;
  }
}
function tgToggleAll(checked) {
  if (!window._tgState) return;
  for (const g of Object.keys(window._tgState)) {
    for (const p of Object.keys(window._tgState[g])) {
      window._tgState[g][p] = checked;
    }
  }
  renderGroups();
}
async function tgSave() {
  if (!window._tgState || !Object.keys(window._tgState).length) return;
  showToast('💾 保存群组开关...', 'info');
  try {
    const r = await apiFetch('/api/bot/' + botNum + '/group-toggles', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({toggles: window._tgState})
    });
    const d = await r.json();
    if (d.ok) { showToast('✅ 已保存', 'success'); }
    else { throw new Error(d.error || '保存失败'); }
  } catch(e) { showToast('❌ ' + e.message, 'error'); }
}

// PAGE: Logs

async function renderLogs() {
  updateBreadcrumb('运行日志');
  updateSidebarActive();
  document.getElementById('pageContent').innerHTML = '<div class="loading-skeleton" style="height:200px;"></div>';

  try {
    const r = await apiFetch(`/api/bot/${botNum}/screen-log`);
    const d = await r.json();
    const logText = d.log || '暂无日志';

    let html = '<div class="card"><div class="card-header"><h3>📋 运行日志 (runtime.log)</h3></div>';
    html += '<div class="card-body"><div class="log-viewer" id="logViewer">';
    // Escape HTML and colorize
    const lines = logText.split('\n');
    for (const line of lines) {
      let cls = '';
      if (line.match(/error|exception|trace|失败|✗/i)) cls = 'error';
      else if (line.match(/warn/i)) cls = 'warn';
      else if (line.match(/✓|成功|启动|连接/i)) cls = 'info';
      html += '<div class="log-line"><span class="' + cls + '">' + escapeHtml(line) + '</span></div>';
    }
    html += '</div></div></div>';
    html += '<div style="display:flex;gap:10px;"><button class="btn btn-default" onclick="navigate(\'logs\')">🔄 刷新</button></div>';
    document.getElementById('pageContent').innerHTML = html;
  } catch (e) {
    document.getElementById('pageContent').innerHTML = '<div class="empty-state"><div class="icon">❌</div><p>加载失败</p></div>';
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ==========================================================
// Router
// ==========================================================
function renderPage() {
  renderSidebar();
  switch (currentPage) {
    case 'dashboard': renderDashboard(); break;
    case 'config': renderConfig(); break;
    case 'groups': renderGroups(); break;
    case 'logs': renderLogs(); break;
    default: renderDashboard();
  }
}

fetchStatus();
renderPage();
