<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理门户 - NapCat WordLib Bot</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<style>
:root {
  --bg-page: #f0f2f5;
  --bg-card: #fff;
  --text-primary: #303133;
  --text-regular: #606266;
  --text-secondary: #909399;
  --border-color: #e4e7ed;
  --color-primary: #409eff;
  --color-primary-light: #66b1ff;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --radius: 12px;
}
[data-theme="dark"] {
  --bg-page: #141414;
  --bg-card: #1d1d1d;
  --text-primary: #e5eaf3;
  --text-regular: #cfd3dc;
  --text-secondary: #a3a6ad;
  --border-color: #333;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg-page); color: var(--text-primary);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  transition: background .2s;
}
.login-card {
  background: var(--bg-card); border-radius: var(--radius);
  box-shadow: var(--shadow); width: 380px; max-width: 90%;
  padding: 40px 32px; text-align: center;
  border: 1px solid var(--border-color);
}
.login-card .logo { font-size: 48px; margin-bottom: 8px; }
.login-card h1 {
  font-size: 20px; font-weight: 600; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--color-primary), #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-card .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; }
.login-card input {
  width: 100%; padding: 12px 16px; border: 1px solid var(--border-color);
  border-radius: 8px; font-size: 14px; outline: none; transition: border .2s;
  background: var(--bg-card); color: var(--text-primary);
  margin-bottom: 16px;
}
.login-card input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 2px rgba(64,158,255,.2); }
.login-card .btn {
  width: 100%; padding: 12px; border: none; border-radius: 8px;
  background: var(--color-primary); color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.login-card .btn:hover { background: var(--color-primary-light); }
.login-card .btn:active { transform: scale(.97); }
.login-card .error { color: #f56c6c; font-size: 13px; min-height: 24px; margin-top: 12px; }
.login-card .hint {
  margin-top: 20px; padding: 12px 16px; border-radius: 8px;
  background: rgba(64,158,255,.08); font-size: 12px; color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.login-card .hint span { display: flex; align-items: center; gap: 4px; }
.theme-btn {
  position: fixed; top: 16px; right: 16px; width: 36px; height: 36px;
  border-radius: 50%; border: 1px solid var(--border-color);
  background: var(--bg-card); cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow);
}
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
<div class="login-card">
  <div class="logo">🤖</div>
  <h1>NapCat WordLib Bot</h1>
  <p class="subtitle">请输入密码进入管理面板</p>
  <input type="password" id="passwordInput" placeholder="输入密码" autofocus>
  <button class="btn" onclick="handleLogin()">进入管理面板</button>
  <div class="error" id="errorMsg"></div>
  <div class="hint">
    <span>⭐ 依星</span><span>🪶 羽笙</span>
  </div>
</div>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? '' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
}
const saved = localStorage.getItem('theme');
if (saved === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); document.getElementById('themeBtn').textContent = '☀️'; }

async function handleLogin() {
  const pwd = document.getElementById('passwordInput').value.trim();
  const err = document.getElementById('errorMsg');
  if (!pwd) { err.textContent = '请输入密码'; return; }
  try {
    const r = await fetch('/api/portal-login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
    const d = await r.json();
    if (d.success && d.redirect) { window.location.href = d.redirect; }
    else { err.textContent = '密码错误，请重试'; document.getElementById('passwordInput').value = ''; setTimeout(() => err.textContent = '', 2000); }
  } catch(e) { err.textContent = '登录服务异常，请稍后重试'; }
}
document.getElementById('passwordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); handleLogin(); }
});
</script>
</body>
</html>
